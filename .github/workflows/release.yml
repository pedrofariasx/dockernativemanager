name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag version matches app version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          APP_VERSION="$(jq -r '.version' src-tauri/tauri.conf.json)"

          if [ -z "$APP_VERSION" ] || [ "$APP_VERSION" = "null" ]; then
            echo "Could not read app version from src-tauri/tauri.conf.json"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match app version ($APP_VERSION)."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config fakeroot

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Arch Linux package is built in a dedicated step below (custom PKGBUILD + makepkg).
          args: --bundles appimage,deb,rpm
          tagName: ${{ github.ref_name }}
          releaseName: "Docker Native Manager ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false

      - name: Build & Package for Arch Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-arch

          PKG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="${PKG_VERSION#v}"
          PKG_VERSION="${PKG_VERSION//-/.}"

          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            archlinux:base-devel bash -c "

              set -e

              pacman -Sy --noconfirm \
                git base-devel rust nodejs npm pnpm \
                cairo gdk-pixbuf2 glib2 gtk3 gtk \
                hicolor-icon-theme libsoup3 webkit2gtk-4.1 \
                gcc-libs

              useradd -m builduser
              echo 'builduser ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers
              chown -R builduser:builduser /repo

              su - builduser -c '
                set -e
                cd /repo

                pnpm install
                pnpm tauri build

                mkdir -p dist-arch

                cp src-tauri/target/release/docker-native-manager dist-arch/
                cp src-tauri/icons/icon.png dist-arch/
                cp LICENSE dist-arch/

                printf \"%s\n\" \
                  \"[Desktop Entry]\" \
                  \"Name=Docker Native Manager\" \
                  \"Exec=docker-native-manager\" \
                  \"Icon=docker-native-manager\" \
                  \"Type=Application\" \
                  \"Categories=Development;\" \
                  > dist-arch/docker-native-manager.desktop

                printf \"%s\n\" \
                  \"pkgname=docker-native-manager-bin\" \
                  \"pkgver=${PKG_VERSION}\" \
                  \"pkgrel=1\" \
                  \"pkgdesc=\\\"A powerful, native GUI for managing Docker environments\\\"\" \
                  \"arch=('x86_64')\" \
                  \"url=\\\"https://github.com/pedrofariasx/dockernativemanager\\\"\" \
                  \"license=('MIT')\" \
                  \"\" \
                  \"depends=('cairo' 'gdk-pixbuf2' 'glib2' 'gtk3' 'gtk' 'hicolor-icon-theme' 'libsoup3' 'webkit2gtk-4.1' 'gcc-libs')\" \
                  \"\" \
                  \"provides=('docker-native-manager')\" \
                  \"conflicts=('docker-native-manager')\" \
                  \"\" \
                  \"options=('!strip')\" \
                  \"\" \
                  \"source=('docker-native-manager'\" \
                  \"        'icon.png'\" \
                  \"        'docker-native-manager.desktop'\" \
                  \"        'LICENSE')\" \
                  \"\" \
                  \"sha256sums=('SKIP' 'SKIP' 'SKIP' 'SKIP')\" \
                  \"\" \
                  \"package() {\" \
                  \"  install -Dm755 \\\"\\\${srcdir}/docker-native-manager\\\" \\\\\" \
                  \"    \\\"\\\${pkgdir}/usr/bin/docker-native-manager\\\"\" \
                  \"\" \
                  \"  install -Dm644 \\\"\\\${srcdir}/icon.png\\\" \\\\\" \
                  \"    \\\"\\\${pkgdir}/usr/share/icons/hicolor/256x256/apps/docker-native-manager.png\\\"\" \
                  \"\" \
                  \"  install -Dm644 \\\"\\\${srcdir}/docker-native-manager.desktop\\\" \\\\\" \
                  \"    \\\"\\\${pkgdir}/usr/share/applications/docker-native-manager.desktop\\\"\" \
                  \"\" \
                  \"  install -Dm644 \\\"\\\${srcdir}/LICENSE\\\" \\\\\" \
                  \"    \\\"\\\${pkgdir}/usr/share/licenses/\\\${pkgname}/LICENSE\\\"\" \
                  \"}\" \
                  > dist-arch/PKGBUILD

                cd dist-arch
                makepkg -s --noconfirm
              '
            "

          ARCH_PKG=$(ls dist-arch/*.pkg.tar.zst)
          gh release upload "${{ github.ref_name }}" "$ARCH_PKG" --clobber

      - name: Package tar.gz and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-targz

          BIN_PATH="src-tauri/target/release/docker-native-manager"
          if [ ! -f "$BIN_PATH" ]; then
            echo "Expected binary not found at $BIN_PATH"
            exit 1
          fi

          PKG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="${PKG_VERSION#v}"

          cp "$BIN_PATH" dist-targz/
          cp LICENSE dist-targz/

          TAR_GZ="Docker.Native.Manager_${PKG_VERSION}_amd64.tar.gz"
          tar -C dist-targz -czf "$TAR_GZ" docker-native-manager LICENSE

          gh release upload "${{ github.ref_name }}" "$TAR_GZ" --clobber
